<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Brexify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    --bg:#f3f2ef;--panel:#fff;--panel2:#f5f4f1;--panel3:#ecebe7;
    --line:#e9e7e2;--line2:#f1efec;--hair:#eeece7;
    --ink:#191919;--ink2:#40403f;--muted:#71717a;--faint:#a3a29c;
    --pri:#18181b;--pri2:#0a0a0a;
    --brex:#2f6bff;--brex2:#1f56e0;--brexbg:#eef3ff;--brexbd:#d7e4ff;
    --ai:#2f6bff;--ai2:#1d4ed8;--aibg:#eef3ff;--aibd:#cfe0ff;
    --green:#16a34a;--greenbg:#e8f8ef;--amber:#d97706;--amberbg:#fdf3e3;--red:#e11d48;--redbg:#fdeaef;--crit:#be123c;
    --blue:#3b82f6;--bluebg:#eaf1ff;--pink:#ec4899;--pinkbg:#fdeef6;
    --peach:linear-gradient(135deg,#ffd0a3 0%,#ff9f7d 46%,#c6a2fb 100%);
    --r1:9px;--r2:14px;--r3:18px;
    --sh1:0 1px 2px rgba(40,34,28,.05),0 1px 3px rgba(40,34,28,.035);
    --sh2:0 14px 38px rgba(40,34,28,.11),0 3px 9px rgba(40,34,28,.05);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 var(--sans);font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased}
  a{color:var(--brex2);text-decoration:none}
  ::selection{background:#ffe0cf}
  .app{min-height:100vh;display:flex}
  /* ---------- left sidebar ---------- */
  .sidebar{width:230px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--hair);
    display:flex;flex-direction:column;gap:3px;padding:15px 13px 14px;position:sticky;top:0;height:100vh;overflow:auto;z-index:14}
  .sidebar::-webkit-scrollbar{width:0}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 6px 12px}
  .logo{width:32px;height:32px;border-radius:10px;background:var(--pri);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px}
  .brand .nm{font-weight:700;font-size:17px;letter-spacing:-.4px}
  .nav{display:flex;flex-direction:column;align-items:stretch;gap:2px;min-width:0}
  .nav .grp{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);font-weight:700;padding:13px 8px 5px}
  .nav a{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:10px;font-size:13.5px;font-weight:500;
    cursor:pointer;color:var(--ink2);white-space:nowrap}
  .nav a svg{width:17px;height:17px;flex-shrink:0;color:var(--faint)}
  .nav a:hover{background:var(--panel2);color:var(--ink)}
  .nav a.on{background:var(--pri);color:#fff;font-weight:600}
  .nav a.on svg{color:#fff}
  .nav a .cnt{margin-left:auto;font-size:10px;font-weight:700;background:var(--red);color:#fff;padding:0 6px;border-radius:20px}
  .sidefoot{margin-top:auto;padding-top:13px;border-top:1px solid var(--hair);display:flex;flex-direction:column;gap:8px}
  .sideuser{display:flex;align-items:center;gap:9px}
  .sideuser select{flex:1;min-width:0}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--peach);display:flex;align-items:center;justify-content:center;color:#5b2b12;font-weight:700;font-size:12.5px;flex-shrink:0}
  .live{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px #d7f0e0}
  .mainwrap{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:10px;padding:11px 26px;background:var(--panel);border-bottom:1px solid var(--hair);position:sticky;top:0;z-index:12}
  .topbar .sp{flex:1;min-width:6px}
  main{flex:1;min-width:0}
  /* ---------- Brex AI ask block ---------- */
  .aiask{margin-top:14px;background:linear-gradient(160deg,#fff 40%,#f1f6ff);border:1px solid var(--aibd);border-radius:14px;padding:13px 14px}
  .aiask-h{display:flex;align-items:center;gap:7px;font-size:13.5px;font-weight:700;letter-spacing:-.2px}
  .aiask-h .aidiamond{color:var(--ai);font-size:15px}
  .aiask-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ai);background:var(--aibg);border:1px solid var(--aibd);border-radius:20px;padding:1px 7px}
  .aiask-sub{font-size:12px;color:var(--muted);margin:4px 0 10px;line-height:1.45}
  .askchips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
  .askchips span{font-size:11.5px;font-weight:500;color:var(--ink2);background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:5px 11px;cursor:pointer;transition:.13s}
  .askchips span:hover{border-color:var(--ai);color:var(--ai);background:var(--aibg)}
  .cosearch{display:flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--panel);border-radius:11px;padding:4px 5px 4px 10px;min-width:300px;box-shadow:var(--sh1)}
  .cosearch svg{width:15px;height:15px;color:var(--faint);flex:none}
  .cosearch input{border:none;background:transparent;outline:none;flex:1;min-width:0;font-size:12.5px;color:var(--ink);padding:4px 0}
  .cosearch button.sm{white-space:nowrap;flex:none}
  .cosearch-wrap{position:relative;min-width:300px}
  .typeahead{position:absolute;top:calc(100% + 5px);left:0;right:0;background:var(--panel);border:1px solid var(--line);border-radius:11px;box-shadow:0 12px 32px rgba(40,34,28,.15);z-index:40;overflow:hidden;max-height:300px;overflow-y:auto}
  .ta-item{display:flex;align-items:center;gap:10px;padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--line)}
  .ta-item:last-child{border-bottom:none}
  .ta-item:hover{background:var(--brexbg)}
  .ta-item .sr-tk{font-weight:700;font-size:11.5px;color:var(--brex);min-width:54px}
  .cobanner{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:11px 14px;margin-bottom:16px;box-shadow:var(--sh1);flex-wrap:wrap}
  .edgarlink{display:flex;align-items:center;gap:9px;margin:2px 0 16px;padding:10px 14px;border:1px solid var(--aibd);background:var(--aibg);border-radius:11px;font-size:12.5px;font-weight:600;color:var(--ai2)}
  .edgarlink svg{width:16px;height:16px;flex:none}
  .edgarlink:hover{background:#e3edff}
  .improvegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(238px,1fr));gap:12px}
  .impcard{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 13px}
  .eff-low{background:var(--greenbg);color:var(--green)}
  .eff-medium{background:var(--amberbg);color:var(--amber)}
  .eff-high{background:var(--redbg);color:var(--crit)}
  .agentsteps{display:flex;flex-direction:column;gap:8px}
  .astep{border:1px solid var(--line);border-radius:11px;padding:10px 12px;background:var(--panel)}
  .astep-h{display:flex;align-items:center;gap:9px;font-size:13px;margin-bottom:5px}
  .astep-n{width:20px;height:20px;border-radius:50%;background:var(--pri);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
  .astep-b{padding-left:29px;display:flex;flex-direction:column;gap:2px}
  @media(max-width:820px){.sidebar{width:74px;padding:14px 10px}.brand .nm,.nav .grp,.nav a span,.sideuser select,.emp{display:none}.nav a{justify-content:center;gap:0;padding:9px 0}.sideuser{justify-content:center}}
  /* page header row (big title + controls) */
  .pghead{display:flex;align-items:center;gap:14px;padding:22px 26px 4px;max-width:1320px;margin:0 auto;flex-wrap:wrap}
  .pghead .tt{min-width:0}
  .pghead .ttl{font-size:30px;font-weight:700;letter-spacing:-.9px;line-height:1.04}
  .pghead .sub{font-size:13px;color:var(--muted);margin-top:3px}
  .pghead .sp{flex:1;min-width:6px}
  .pill{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border:1px solid var(--line);border-radius:12px;background:var(--panel);font-size:13px;font-weight:500;color:var(--ink2);cursor:pointer}
  .pghead select{max-width:150px}
  .search{display:flex;align-items:center;gap:8px;flex:0 1 210px;min-width:44px;padding:8px 12px;border:1px solid var(--line);border-radius:12px;background:var(--panel2);color:var(--muted);cursor:text;font-size:13px;overflow:hidden}
  .search>span:not(.kbd){overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .search svg{width:15px;height:15px}
  .search .kbd{margin-left:auto;font-size:11px;border:1px solid var(--line);border-radius:6px;padding:1px 5px;background:#fff;color:var(--faint);font-family:var(--mono)}
  select,input,button,textarea{font:inherit}
  select,input.t{padding:8px 11px;border:1px solid var(--line);border-radius:11px;background:var(--panel);color:var(--ink)}
  button{cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:8px 14px;border-radius:12px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:.14s}
  button svg{width:15px;height:15px}
  button.primary{background:var(--pri);color:#fff;border-color:var(--pri)}
  button.ai{background:var(--brex);color:#fff;border-color:var(--brex)}
  button.sm{padding:6px 10px;font-size:12px;font-weight:600;border-radius:10px}
  button.ghost{background:transparent;border-color:transparent}
  button:hover{filter:brightness(.985)}button.primary:hover,button.ai:hover{filter:brightness(1.14)}button:active{transform:translateY(.5px)}
  .iconbtn{position:relative;width:38px;height:38px;padding:0;justify-content:center;border-radius:11px}
  .iconbtn:hover{background:var(--panel2)}
  .iconbtn .badge{position:absolute;top:-3px;right:-3px;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:20px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 4px}
  .cost{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .page{padding:14px 26px 44px;max-width:1320px;margin:0 auto}
  h1.pt{font-size:22px;font-weight:700;letter-spacing:-.6px;margin:0}
  h2{font-size:11.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin:24px 0 11px;font-weight:600;display:flex;align-items:center;gap:8px}
  h1 svg,h2 svg,h3 svg{width:16px;height:16px;flex:none}
  h3{font-size:14px;font-weight:600;margin:0 0 8px}
  .lede{color:var(--muted);margin:0 0 14px;font-size:13.5px}
  .muted{color:var(--muted)}.green{color:var(--green)}.red{color:var(--red)}
  /* ---------- stat cards ---------- */
  .strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(178px,1fr));gap:13px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--r2);padding:14px 15px;box-shadow:var(--sh1)}
  .stat .k{font-size:11.5px;color:var(--muted);font-weight:500}
  .stat .vrow{display:flex;align-items:flex-end;justify-content:space-between;gap:6px;margin-top:7px}
  .stat .v{font-size:25px;font-weight:700;letter-spacing:-.6px;line-height:1}
  .stat .s{font-size:12px;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .stat.hero{background:linear-gradient(155deg,#fff 30%,var(--brexbg));border-color:var(--brexbd)}
  .stat.hero .v{color:var(--brex2)}
  .stat.ai{background:linear-gradient(155deg,#fff 30%,var(--aibg));border-color:var(--aibd)}
  .delta{font-weight:600;display:inline-flex;align-items:center;gap:2px;font-variant-numeric:tabular-nums}
  .delta.up{color:var(--green)}.delta.down{color:var(--red)}
  .pillbadge{font-size:11px;font-weight:600;padding:1px 8px;border-radius:20px;background:var(--panel2);color:var(--muted)}
  .pill-healthy{background:var(--greenbg);color:var(--green)}.pill-watch{background:var(--amberbg);color:var(--amber)}.pill-critical{background:var(--redbg);color:var(--crit)}
  /* ---------- cards / layout ---------- */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r3);padding:16px 18px;box-shadow:var(--sh1)}
  .card .ch{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .card .ch h3{margin:0}.card .ch .sp{flex:1}
  .row{display:grid;gap:16px}
  .g2{grid-template-columns:1.55fr 1fr}
  .g3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:960px){.g2,.g3{grid-template-columns:1fr}}
  .dash{display:flex;flex-direction:column;gap:16px}
  /* ---------- AI + insights ---------- */
  .aidiamond{color:var(--ai)}
  .aipill{display:inline-flex;gap:4px;align-items:center;background:var(--aibg);color:var(--ai2);border:1px solid var(--aibd);border-radius:20px;padding:1px 9px;font-size:10.5px;font-weight:600;letter-spacing:.2px;text-transform:none}
  .insights{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:820px){.insights{grid-template-columns:1fr}}
  .insight{display:flex;gap:12px;padding:13px 15px;border:1px solid var(--line);border-radius:var(--r2);background:var(--panel);box-shadow:var(--sh1);align-items:flex-start}
  .insight .ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .insight .ic svg{width:17px;height:17px}
  .ic-critical{background:var(--redbg);color:var(--crit)}.ic-high{background:var(--redbg);color:var(--red)}
  .ic-medium{background:var(--amberbg);color:var(--amber)}.ic-low{background:var(--aibg);color:var(--ai2)}
  .insight .bd{flex:1;min-width:0}
  .insight .t{font-weight:600;font-size:13.5px;line-height:1.35}
  .insight .amt{color:var(--brex2)}
  .insight .d{font-size:12.5px;color:var(--muted);margin-top:2px}
  .insight .act{margin-top:9px}
  .askbar{display:flex;gap:8px;align-items:center;background:linear-gradient(120deg,var(--aibg),#fff);border:1px solid var(--aibd);border-radius:12px;padding:8px 8px 8px 14px}
  .askbar input{flex:1;border:none;background:transparent;outline:none;font-size:14px}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}
  .chip{font-size:12px;padding:5px 11px;border:1px solid var(--line);border-radius:20px;background:var(--panel);cursor:pointer;color:var(--ink2)}
  .chip:hover{border-color:var(--ai);color:var(--ai2)}
  /* ---------- tables / grid ---------- */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:9px 11px;border-bottom:1px solid var(--line2);text-align:left;white-space:nowrap}
  th{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;font-weight:600;position:sticky;top:0;background:var(--panel)}
  td.n,th.n{text-align:right;font-variant-numeric:tabular-nums}
  tbody tr:hover{background:var(--panel2)}tbody tr.click{cursor:pointer}
  .tablewrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--r3);overflow:auto;max-height:64vh;box-shadow:var(--sh1)}
  .tbar{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .tbar .ct{font-size:12.5px;color:var(--muted)}.tbar .sp{flex:1}
  th.sortable{cursor:pointer;user-select:none}th.sortable:hover{color:var(--brex)}
  th .arr{color:var(--brex);font-size:10px}
  .rb{padding:1px 8px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block}
  .rb-critical{background:var(--redbg);color:var(--crit)}.rb-high{background:var(--redbg);color:var(--red)}
  .rb-medium{background:var(--amberbg);color:var(--amber)}.rb-low{background:var(--greenbg);color:var(--green)}
  .tag{padding:1px 8px;border-radius:7px;font-size:11px;background:var(--panel2);color:var(--muted)}
  .flagpill{padding:1px 7px;border-radius:7px;font-size:10.5px;background:var(--amberbg);color:var(--amber);margin-right:3px}
  .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .filters label{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:5px}
  /* ---------- bars / hbars / progress ---------- */
  .bars .barrow{display:grid;grid-template-columns:150px 1fr 92px;gap:9px;align-items:center;margin:6px 0;font-size:13px}
  .bars .lb{color:var(--muted);overflow:hidden;text-overflow:ellipsis}
  .bars .bt{background:var(--panel2);border-radius:6px;overflow:hidden;height:8px}
  .bars .bf{height:8px;background:var(--brex);border-radius:6px}
  .bars .bv{text-align:right}
  .hbars .hbar{display:grid;grid-template-columns:130px 1fr 74px;gap:10px;align-items:center;margin:7px 0;font-size:13px}
  .hbars .hl{color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hbars .ht{background:var(--panel2);border-radius:6px;overflow:hidden;height:9px}
  .hbars .ht i{display:block;height:9px;border-radius:6px}
  .hbars .hv{text-align:right;color:var(--ink2)}
  .prog{height:9px;border-radius:6px;background:var(--panel2);overflow:hidden}
  .prog>i{display:block;height:100%;border-radius:6px;background:var(--brex);transition:width .3s}
  .prog.warn>i{background:var(--amber)}.prog.over>i{background:var(--red)}
  .dleg{display:flex;align-items:center;gap:7px;font-size:12.5px;margin:4px 0}
  .dleg i{width:9px;height:9px;border-radius:3px;flex-shrink:0}
  /* ---------- charts ---------- */
  .chart2{width:100%;height:auto;display:block;overflow:visible}
  .axl{fill:var(--faint);font-size:11px;font-weight:500}
  .spark{display:block}
  .legend{display:flex;gap:14px;font-size:12px;color:var(--muted);margin-top:8px;flex-wrap:wrap}
  .legend i{display:inline-block;width:16px;height:3px;border-radius:2px;vertical-align:middle;margin-right:5px}
  .proof{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0}
  .proof .p{border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .proof .pl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .proof .pv{font-size:20px;font-weight:700;margin-top:3px}
  .row2{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}@media(max-width:900px){.row2{grid-template-columns:1fr}}
  .ctrls{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 12px}
  .ctrls .iv{padding:6px 12px;border:1px solid var(--line);border-radius:20px;cursor:pointer;font-size:13px;background:var(--panel)}
  .ctrls .iv:hover{border-color:var(--brex);color:var(--brex)}.ctrls .iv.on{background:var(--brex);color:#fff;border-color:var(--brex)}
  iframe.rcpt{width:100%;height:80vh;border:1px solid var(--line);border-radius:var(--r3);background:#fff}
  /* ---------- kpis (legacy compat) ---------- */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
  .kpi2{background:var(--panel);border:1px solid var(--line);border-radius:var(--r2);padding:13px 15px;box-shadow:var(--sh1)}
  .kpi2 .k{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  .kpi2 .v{font-size:22px;font-weight:700;margin-top:4px;letter-spacing:-.4px}
  .kpi2 .s{font-size:12px;color:var(--muted);margin-top:2px}
  .hero.kpi2{background:linear-gradient(150deg,#fff,var(--brexbg));border-color:var(--brexbd)}.hero .v{color:var(--brex)}
  /* ---------- skeleton ---------- */
  .sk{background:linear-gradient(90deg,var(--panel2) 25%,var(--panel3) 37%,var(--panel2) 63%);background-size:400% 100%;animation:sh 1.3s ease infinite;border-radius:9px}
  @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
  .skgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(178px,1fr));gap:13px}
  .spin{color:var(--muted);font-style:italic;padding:14px 2px}
  .empty{text-align:center;color:var(--muted);padding:34px 18px;border:1px dashed var(--line);border-radius:var(--r3)}
  .empty .eh{font-weight:600;color:var(--ink);font-size:14px;margin-bottom:4px}
  /* ---------- AI drawer ---------- */
  .ai{position:fixed;top:0;right:0;width:440px;max-width:94vw;height:100vh;background:var(--panel);
    border-left:1px solid var(--line);box-shadow:-10px 0 34px rgba(16,24,40,.10);transform:translateX(100%);
    transition:.22s cubic-bezier(.4,0,.2,1);z-index:24;display:flex;flex-direction:column}

<script>
const $=s=>document.querySelector(s), el=id=>document.getElementById(id);
const money=n=>(n<0?'-$':'$')+Math.round(Math.abs(+n||0)).toLocaleString();
const money1=n=>{n=+n||0;const a=Math.abs(n),s=n<0?'-':'';const U=[[1e12,'T',2],[1e9,'B',2],[1e6,'M',2],[1e3,'K',1]];
  for(let i=0;i<U.length;i++){const[d,suf,p]=U[i];if(a>=d){if(+(a/d).toFixed(p)>=1000&&i>0)return s+'$'+(a/U[i-1][0]).toFixed(U[i-1][2])+U[i-1][1];return s+'$'+(a/d).toFixed(p)+suf;}}
  return s+'$'+Math.round(a).toLocaleString();};
// Safe JS-string literal for a double-quoted onclick attribute: single-quoted, with
// quotes/backslashes escaped and any " HTML-encoded so it can't terminate the attribute.
const q1=s=>"'"+String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;')+"'";
const pct=n=>(n*100).toFixed(1)+'%';
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const rb=(b,t)=>`<span class="rb rb-${b}">${t}</span>`;
const kpis=p=>'<div class="kpis">'+p.map(([k,v,s])=>`<div class="kpi2 ${s==='hero'?'hero':''}"><div class="k">${k}</div><div class="v">${v}</div>${s&&s!=='hero'?`<div class="s">${s}</div>`:''}</div>`).join('')+'</div>';
const ftable=(h,r)=>r.length?'<table class="ftable"><tr>'+h.map(x=>`<th>${x}</th>`).join('')+'</tr>'+r.map(row=>'<tr>'+row.map(c=>`<td>${c}</td>`).join('')+'</tr>').join('')+'</table>':'<div class="muted">none</div>';
function bars(p){p=p.filter(x=>x&&x[1]!=null);const m=Math.max(...p.map(x=>+x[1]||0),1);return '<div class="bars">'+p.slice(0,8).map(([k,v])=>`<div class="barrow"><div class="lb">${k}</div><div class="bt"><div class="bf" style="width:${Math.max(3,100*(+v||0)/m)}%"></div></div><div class="bv">${money(v)}</div></div>`).join('')+'</div>';}
function hbars(p,o){o=o||{};p=p.filter(x=>x&&x[1]!=null);const m=Math.max(...p.map(x=>+x[1]||0),1),col=o.color||'#3b82f6';return '<div class="hbars">'+p.slice(0,o.n||8).map(([k,v])=>`<div class="hbar"><div class="hl">${esc(k)}</div><div class="ht"><i style="width:${Math.max(2,100*(+v||0)/m).toFixed(1)}%;background:${col}"></i></div><div class="hv">${money1(v)}</div></div>`).join('')+'</div>';}
function delta(p,goodUp){if(p==null)return '';const up=p>=0,good=(goodUp!==false)?up:!up;return `<span class="delta ${good?'up':'down'}">${up?'▲':'▼'} ${Math.abs(p*100).toFixed(1)}%</span>`;}
function stat(label,value,o){o=o||{};const sk=o.spark&&o.spark.length>1?spark(o.spark,o.accent||(o.hero?'#3b82f6':'#9aa1ab')):'';const d=o.delta!=null?delta(o.delta,o.goodUp):'';const sub=o.sub?`<span>${o.sub}</span>`:'';return `<div class="stat ${o.hero?'hero':''} ${o.ai?'ai':''}"><div class="k">${esc(label)}</div><div class="vrow"><div class="v">${value}</div>${sk}</div><div class="s">${d}${sub||(d?'':'&nbsp;')}</div></div>`;}

// ---------- icons (feather-style, 2px stroke) ----------
const ICON={
  home:'<path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/>',
  grid:'<rect x="3" y="3" width="7.5" height="7.5" rx="1.4"/><rect x="13.5" y="3" width="7.5" height="7.5" rx="1.4"/><rect x="3" y="13.5" width="7.5" height="7.5" rx="1.4"/><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="1.4"/>',
  receipt:'<path d="M6 2h12v20l-3-2-3 2-3-2-3 2z"/><path d="M9 7h6M9 11h6M9 15h4"/>',
  card:'<rect x="2" y="5" width="20" height="14" rx="2.5"/><path d="M2 10h20"/>',
  target:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="0.6"/>',
  box:'<path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/>',
  tasks:'<path d="M4 5h16v14H4z"/><path d="M8.5 12l2.2 2.2L16 9"/>',
  bill:'<path d="M14 2H6v20h12V8z"/><path d="M14 2v6h6"/><path d="M9 13h6M9 17h4"/>',
  scan:'<path d="M4 8V5a1 1 0 0 1 1-1h3M16 4h3a1 1 0 0 1 1 1v3M20 16v3a1 1 0 0 1-1 1h-3M8 20H5a1 1 0 0 1-1-1v-3"/><path d="M4 12h16"/>',
  check:'<circle cx="12" cy="12" r="9"/><path d="M8 12l3 3 5-6"/>',
  shield:'<path d="M12 2l8 3v6c0 5-3.5 8-8 11-4.5-3-8-6-8-11V5z"/>',
  book:'<path d="M5 4a2 2 0 0 1 2-2h11v20H7a2 2 0 0 1-2-2z"/><path d="M9 2v18"/>',
  bank:'<path d="M3 10l9-6 9 6"/><path d="M5 10v9M19 10v9M9 10v9M15 10v9"/><path d="M3 21h18"/>',
  trend:'<path d="M3 17l6-6 4 4 7-8"/><path d="M17 7h4v4"/>',
  export:'<path d="M12 3v13"/><path d="M7 11l5 5 5-5"/><path d="M4 21h16"/>',
  people:'<circle cx="9" cy="8" r="3"/><path d="M3.5 20c0-3.3 2.7-5.5 5.5-5.5s5.5 2.2 5.5 5.5"/><path d="M16.5 5.2a3 3 0 0 1 0 5.6"/>',
  alert:'<path d="M12 3l9 16H3z"/><path d="M12 10v4M12 17.5v.5"/>',
  copy:'<rect x="9" y="9" width="12" height="12" rx="2"/><path d="M6 15H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v2"/>',
  layers:'<path d="M12 3l9 5-9 5-9-5z"/><path d="M3 13l9 5 9-5"/>',
  trending:'<path d="M22 7l-8.5 8.5-5-5L2 17"/><path d="M16 7h6v6"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>',
  bolt:'<path d="M13 2L4 14h7l-1 8 9-12h-7z"/>'};
function ic(n){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICON[n]||ICON.grid}</svg>`;}

// ---------- charts ----------
function spark(vals,color){color=color||'#3b82f6';const W=110,H=30,p=3,n=vals.length,min=Math.min(...vals),max=Math.max(...vals);
  const X=i=>p+(W-2*p)*i/(n-1),Y=v=>H-p-(H-2*p)*(v-min)/((max-min)||1);
  const d=vals.map((v,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
  const area=d+` L${X(n-1).toFixed(1)} ${H-p} L${X(0).toFixed(1)} ${H-p} Z`;
  return `<svg viewBox="0 0 ${W} ${H}" width="86" height="26" class="spark"><path d="${area}" fill="${color}" opacity=".11"/><path d="${d}" fill="none" stroke="${color}" stroke-width="1.75"/><circle cx="${X(n-1).toFixed(1)}" cy="${Y(vals[n-1]).toFixed(1)}" r="2" fill="${color}"/></svg>`;}
function lineChart(o){
  const S=o.series||[],labels=o.labels||[];
  const all=S.flatMap(s=>s.data||[]).filter(v=>v!=null).concat(o.band?o.band.lo.concat(o.band.hi).filter(v=>v!=null):[]);
  if(!all.length)return '<div class="muted" style="padding:20px">no data</div>';
  const H=o.height||250,W=880,padL=62,padR=18,padT=14,padB=26;
  let min=Math.min(...all),max=Math.max(...all);if(min>0)min=Math.min(min,min*.9);const span=(max-min)||1;min-=span*.04;max+=span*.06;
  const n=Math.max(labels.length,2);
  const X=i=>padL+(W-padL-padR)*i/(n-1),Y=v=>padT+(H-padT-padB)*(1-(v-min)/((max-min)||1));

  let g='';for(let k=0;k<=4;k++){const v=min+(max-min)*k/4,y=Y(v);g+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="var(--line2)"/><text x="${padL-8}" y="${(y+4).toFixed(1)}" text-anchor="end" class="axl">${fY(v)}</text>`;}

// ---------- signature visuals (hatched funnel bars, waffle, stepped area, progress rows, peach) ----------
function funnelBars(items){
  const W=680,H=210,padT=30,padB=42,n=items.length,max=Math.max(...items.map(i=>+i.value||0),1);
  const gap=W/n,bw=gap*0.6,Y=v=>padT+(H-padT-padB)*(1-v/max);

    `<pattern id="hatch" width="7" height="7" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="7" height="7" fill="#3b82f6" opacity=".10"/><line x1="0" y1="0" x2="0" y2="7" stroke="#3b82f6" stroke-width="3" opacity=".26"/></pattern></defs>`;
  let g='';
  items.forEach((it,i)=>{const x=gap*i+(gap-bw)/2,y=Y(+it.value||0),h=Math.max(2,(H-padB)-y),act=it.active;
    g+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="7" fill="${act?'url(#fg)':'url(#hatch)'}"/>`;
    g+=`<text x="${(x+bw/2).toFixed(1)}" y="${(y-9).toFixed(1)}" text-anchor="middle" style="font-size:14px;font-weight:700;fill:${act?'#1f56e0':'#71717a'}">${esc(it.value_label)}</text>`;
    g+=`<text x="${(x+bw/2).toFixed(1)}" y="${(H-padB+18).toFixed(1)}" text-anchor="middle" style="font-size:11px;fill:#8b8a83">${esc(it.label)}</text>`;});
  return `<svg viewBox="0 0 ${W} ${H}" class="chart2" preserveAspectRatio="xMidYMid meet">${defs}${g}</svg>`;}
function waffle(vals,color){color=color||'#22c55e';vals=(vals||[]).slice(-16);const max=Math.max(...vals,1);
  return '<div class="waffle">'+vals.map(v=>{const f=Math.max(0,Math.round((+v||0)/max*4));let c='';for(let r=0;r<4;r++)c+=`<i style="background:${r>=(4-f)?color:'var(--panel3)'}"></i>`;return c;}).join('')+'</div>';}
function steppedArea(vals,color){color=color||'#ec4899';const W=560,H=180,padL=4,padR=4,padT=14,padB=8,n=vals.length;
  const min=Math.min(...vals),max=Math.max(...vals),X=i=>padL+(W-padL-padR)*i/(n-1),Y=v=>padT+(H-padT-padB)*(1-(v-min)/((max-min)||1));
  let line='M'+X(0).toFixed(1)+' '+Y(vals[0]).toFixed(1);
  for(let i=1;i<n;i++)line+=' H'+X(i).toFixed(1)+' V'+Y(vals[i]).toFixed(1);
  const area=line+` V${(H-padB).toFixed(1)} H${X(0).toFixed(1)} Z`;
  return `<svg viewBox="0 0 ${W} ${H}" class="chart2" preserveAspectRatio="none" style="height:150px"><path d="${area}" fill="${color}" opacity=".14"/><path d="${line}" fill="none" stroke="${color}" stroke-width="2.2" vector-effect="non-scaling-stroke"/></svg>`;}
function progressRows(items){const max=Math.max(...items.map(i=>+i.value||0),1);
  return '<div class="prows">'+items.map(it=>`<div class="prow"><div class="pl"><span>${esc(it.label)}</span><b>${money(it.value)}</b></div><div class="ptrack"><i style="width:${Math.max(3,100*(+it.value||0)/max).toFixed(0)}%;background:${it.color}"></i></div></div>`).join('')+'</div>';}
function peachInsight(o){return `<div class="peachcard"><span class="lab"><span class="aidiamond" style="color:#fff">◆</span> ${esc(o.label||'Insight')}</span><div class="big">${esc(o.big)}</div><div class="desc">${esc(o.desc)}</div>${o.sub?`<div class="psub">${esc(o.sub)}</div>`:''}</div>`;}

// ---------- interactive data grid ----------
const GRIDS={};
function grid(id,cols,rows,opts){opts=opts||{};
  GRIDS[id]={cols,rows,sort:opts.sort||null,rowClick:opts.rowClick||null,file:opts.file||'export',title:opts.title||'',serverCsv:opts.serverCsv||null};
  return `<div class="grid" id="${id}">${gridBody(id)}</div>`;}
function dlUrl(u){const a=document.createElement('a');a.href=u;a.download='';document.body.appendChild(a);a.click();a.remove();}
function gridRows(id){const g=GRIDS[id];let rows=g.rows.slice();
  if(g.sort){const c=g.cols.find(x=>x.key===g.sort.key),dir=g.sort.dir==='asc'?1:-1;
    if(c)rows.sort((a,b)=>{let va=c.get(a),vb=c.get(b);
      if(c.type==='num')return ((+va||0)-(+vb||0))*dir;
      va=String(va==null?'':va).toLowerCase();vb=String(vb==null?'':vb).toLowerCase();
      return va<vb?-dir:va>vb?dir:0;});}
  return rows;}
function gridBody(id){const g=GRIDS[id],rows=gridRows(id);
  const head='<tr>'+g.cols.map(c=>{const al=c.align==='n'?'n':'';
    if(c.nosort)return `<th class="${al}">${esc(c.label)}</th>`;
    const on=g.sort&&g.sort.key===c.key,ar=on?(g.sort.dir==='asc'?'▲':'▼'):'';
    return `<th class="sortable ${al}" onclick="sortGrid('${id}','${c.key}')">${esc(c.label)}<span class="arr"> ${ar}</span></th>`;}).join('')+'</tr>';
  const body=rows.map(r=>{const cl=g.rowClick?` class="click" onclick="${g.rowClick(r)}"`:'';
    return `<tr${cl}>`+g.cols.map(c=>`<td class="${c.align==='n'?'n':''}">${c.cell?c.cell(r):esc(c.get(r))}</td>`).join('')+'</tr>';}).join('');
  return `<div class="tbar">${g.title?`<span class="ct"><b>${esc(g.title)}</b></span>`:''}<span class="ct">${rows.length.toLocaleString()} row${rows.length===1?'':'s'}</span><span class="sp"></span>
    ${g.serverCsv?`<button class="sm" onclick="dlUrl('${g.serverCsv}')" title="Server-side full export (all rows)">⤓ Export all</button>`:''}
    <button class="sm" onclick="exportGrid('${id}')" title="Download what's shown (current sort) as CSV">⤓ Export CSV</button></div>
    <div class="tablewrap"><table>${head}${body}</table></div>`;}
function sortGrid(id,key){const g=GRIDS[id],c=g.cols.find(x=>x.key===key);
  if(g.sort&&g.sort.key===key)g.sort.dir=g.sort.dir==='asc'?'desc':'asc';
  else g.sort={key,dir:c.type==='num'?'desc':'asc'};
  el(id).innerHTML=gridBody(id);}
function exportGrid(id){const g=GRIDS[id],rows=gridRows(id),cols=g.cols.filter(c=>!c.noexport);
  const q=v=>{v=v==null?'':String(v);return /[",\n\r]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const csv=[cols.map(c=>q(c.label)).join(',')].concat(rows.map(r=>cols.map(c=>q(c.get(r))).join(','))).join('\r\n');
  const blob=new Blob([String.fromCharCode(0xFEFF)+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(g.file||'export')+'.csv';document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1500);}

function closePalette(){el('cmdk').classList.remove('open');}
function renderPalette(){const q=el('cmdInput').value.trim().toLowerCase();
  let items=paletteItems();if(q)items=items.filter(i=>(i.label+' '+(i.sub||'')).toLowerCase().includes(q));
  PAL.items=items;PAL.sel=0;
  let html='',grp='';items.forEach((it,i)=>{if(it.grp!==grp){grp=it.grp;html+=`<div class="cmdgrp">${grp}</div>`;}html+=`<div class="cmditem ${i===0?'sel':''}" data-i="${i}" onmouseover="PAL.sel=${i};paintPalette()" onclick="runPalette(${i})">${ic(it.icon)}<span>${esc(it.label)}</span>${it.sub?`<span class="cs">${esc(it.sub)}</span>`:''}</div>`;});
  el('cmdList').innerHTML=html||'<div class="cmdgrp">No matches</div>';}
function paintPalette(){el('cmdList').querySelectorAll('.cmditem').forEach(e=>e.classList.toggle('sel',+e.dataset.i===PAL.sel));}
function runPalette(i){const it=PAL.items[i];closePalette();if(it)it.run();}
function paletteKey(e){if(e.key==='ArrowDown'){e.preventDefault();PAL.sel=Math.min(PAL.sel+1,PAL.items.length-1);paintPalette();scrollSel();}
  else if(e.key==='ArrowUp'){e.preventDefault();PAL.sel=Math.max(PAL.sel-1,0);paintPalette();scrollSel();}
  else if(e.key==='Enter'){e.preventDefault();runPalette(PAL.sel);}}
function scrollSel(){const s=el('cmdList').querySelector('.cmditem.sel');if(s)s.scrollIntoView({block:'nearest'});}
function createMenu(){const items=[['Issue a card',"openPage('cards')"],['Pay a bill',"SUB.payables='bills';openPage('payables')"],['Review budgets',"SUB.controls='budgets';openPage('controls')"],['Research a company',"openPage('research')"],['Schedule an export',"SUB.automation='exports';openPage('automation')"],['Ask Brex AI',"openAI('forensics')"]];
  showMenu(el('createBtn'),items.map(([l,fn])=>`<button onclick="closeMenu();${fn}">${l}</button>`).join(''));}
function showMenu(anchor,html){const r=anchor.getBoundingClientRect();el('menuHost').innerHTML=`<div class="menu" style="top:${r.bottom+6}px;left:${r.left}px" onclick="event.stopPropagation()">${html}</div>`;setTimeout(()=>document.addEventListener('click',closeMenu,{once:true}),0);}

function coSearchHTML(inp,dd,ph){return `<div class="cosearch-wrap"><div class="cosearch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input id="${inp}" placeholder="${esc(ph)}" autocomplete="off"></div><div class="typeahead" id="${dd}" style="display:none"></div></div>`;}
function wireCoSearch(inp,dd){
  const i=el(inp); if(!i)return; const hide=()=>{const d=el(dd);if(d)d.style.display='none';};
  i.oninput=()=>{clearTimeout(window._cot);const q=i.value.trim();if(q.length<2){hide();return;}
    window._cot=setTimeout(async()=>{try{const r=await jget('/api/research/search?q='+encodeURIComponent(q));const d=el(dd);if(!d)return;
      if(!r.results||!r.results.length){d.innerHTML='<div class="ta-item" style="cursor:default;color:var(--muted)">No matches</div>';d.style.display='block';return;}
      d.innerHTML=r.results.map(x=>`<div class="ta-item" onmousedown="pickCompany(${q1(x.ticker)})"><span class="sr-tk">${esc(x.ticker)}</span><span>${esc(x.name)}</span></div>`).join('');d.style.display='block';
    }catch(e){hide();}},220);};
  i.onkeydown=e=>{if(e.key==='Enter'){const f=el(dd)&&el(dd).querySelector('.ta-item[onmousedown]');if(f)f.dispatchEvent(new MouseEvent('mousedown'));}else if(e.key==='Escape')hide();};
  i.onblur=()=>setTimeout(hide,160);
}

// ---------- Research: live SEC EDGAR ----------
let RESEARCH_PENDING='';
function goResearch(q){RESEARCH_PENDING=(q||'').trim();openPage('research');}
function pgResearch(){
  if(RESEARCH_TICKER){const t=RESEARCH_TICKER;RESEARCH_TICKER='';companyProfile(t);return;}
  view().innerHTML=`<p class="lede">Pull any US public company's <b>as-filed</b> financials from live SEC EDGAR (XBRL), recompute the ratios and accounting tie-outs, size the Brex spend opportunity, then let Claude analyze and act on it — the same financial-correctness discipline we apply to spend.</p>
    <div class="askbar" style="max-width:520px"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#2f6bff" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input id="resq" placeholder="Search a company or ticker — e.g. Costco, AAPL, Nike…" autocomplete="off"></div>
    <div class="chips">${['AAPL','MSFT','COST','NKE','AMZN','WMT'].map(t=>`<span class="chip" onclick="companyProfile('${t}')">${t}</span>`).join('')}</div>
    <div id="resout" style="margin-top:16px"></div>`;
  el('resq').oninput=()=>{clearTimeout(window._rt);window._rt=setTimeout(resSearch,300);};
  if(RESEARCH_PENDING){el('resq').value=RESEARCH_PENDING;RESEARCH_PENDING='';resSearch();}
  else el('resq').focus();
}
async function resSearch(){const q=el('resq').value.trim();if(q.length<2){el('resout').innerHTML='';return;}
  el('resout').innerHTML='<div class="spin">searching EDGAR…</div>';
  try{const d=await jget('/api/research/search?q='+encodeURIComponent(q));
    el('resout').innerHTML=d.results.length?d.results.map(r=>`<div class="sr-item" onclick="companyProfile('${r.ticker}')"><span class="sr-tk">${r.ticker}</span><span>${esc(r.name)}</span></div>`).join(''):'<div class="muted">No matches.</div>';
  }catch(e){el('resout').innerHTML='<div class="red">EDGAR unavailable: '+esc(String(e))+'</div>';}
}
async function companyProfile(ticker){
  const g=navGen(); view().innerHTML='<div class="spin">pulling '+esc(ticker)+' from SEC EDGAR…</div>';
  let p;try{p=await jget('/api/research/company/'+ticker);}catch(e){if(!fresh(g))return;view().innerHTML=backTo('pgResearch()','Search')+'<div class="card"><span class="red">Could not load '+esc(ticker)+': '+esc(String(e))+'</span></div>';return;}
  if(!fresh(g))return;
  const s=p.series,R=p.ratios,sp=p.spend||{},f=p.filing||{},fy=v=>v.map(r=>r.fy),val=v=>v.map(r=>r.value),last=v=>v.length?v[v.length-1].value:null;
  const filingUrl=f.latest_10k_url||f.browse_url, cs=sp.cost_structure||[], levers=sp.levers||[];
  const maxpct=Math.max(...cs.map(c=>c.pct_of_revenue||0),0.01);

     <a class="edgarlink" href="${esc(filingUrl)}" target="_blank" rel="noopener">${ic('scan')} Open the actual ${esc(f.form||'10-K')} filing on SEC EDGAR${f.latest_10k_date?' ('+esc(f.latest_10k_date)+')':''} <span style="margin-left:auto;font-weight:600">↗</span></a>`+
    kpis([['Revenue FY'+p.latest_fy,s.revenue.length?money1(last(s.revenue)):'—','hero'],
      ['Net income',s.net_income.length?money1(last(s.net_income)):'—'],
      ['Net margin',R.net_margin!=null?pct(R.net_margin):'—'],
      ['Operating margin',R.operating_margin!=null?pct(R.operating_margin):'—'],
      ['Revenue YoY',R.revenue_yoy!=null?((R.revenue_yoy>=0?'+':'')+pct(R.revenue_yoy)):'—'],
      ['ROE',R.roe!=null?pct(R.roe):'—'],['Debt / Equity',R.debt_to_equity!=null?R.debt_to_equity.toFixed(2):'—']])+
    `<div class="row g2" style="margin-top:16px">
       <div class="card"><div class="ch"><h3>Revenue · 6-yr (as filed)</h3></div>${s.revenue.length?barChart(fy(s.revenue),val(s.revenue)):'<div class="muted">n/a</div>'}</div>
       <div class="card"><div class="ch"><h3>Net income</h3></div>${s.net_income.length?barChart(fy(s.net_income),val(s.net_income),{color:'#22c55e'}):'<div class="muted">n/a</div>'}</div></div>
     ${s.assets.length&&s.equity.length?`<div class="card" style="margin-top:16px"><div class="ch"><h3>Balance sheet: assets vs liabilities + equity</h3></div>${lineChart({labels:fy(s.assets),series:[{name:'assets',color:'#18181b',data:val(s.assets)},{name:'liabilities',color:'#3b82f6',data:val(s.liabilities)},{name:'equity',color:'#22c55e',data:val(s.equity)}],height:220})}</div>`:''}

     <h2>Cost structure & spend opportunity <span class="aipill">Brex spend lens</span></h2>
     <div class="row g2">
       <div class="card"><div class="ch"><h3>Operating cost lines · FY${p.latest_fy}</h3><span class="sp"></span><span class="muted" style="font-size:12px">% of revenue</span></div>
         ${cs.length?cs.map((c,i)=>`<div style="margin:10px 0"><div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px"><span style="font-weight:500">${esc(c.label)}</span><span class="muted">${money1(c.usd)} · <b style="color:var(--ink)">${c.pct_of_revenue!=null?pct(c.pct_of_revenue):'—'}</b></span></div><div class="ptrack"><i style="width:${Math.max(2,100*(c.pct_of_revenue||0)/maxpct).toFixed(1)}%;background:${barcol[i%barcol.length]}"></i></div></div>`).join(''):'<div class="muted">cost lines not separately filed</div>'}
         ${s.sga.length>1?`<div style="margin-top:14px"><div class="muted" style="font-size:11.5px;margin-bottom:6px">SG&amp;A · 6-yr (as filed)</div>${barChart(fy(s.sga),val(s.sga),{color:'#ec4899'})}</div>`:''}
       </div>
       <div class="card" style="display:flex;flex-direction:column">
         <div class="ch"><h3>Addressable spend Brex would manage</h3></div>
         <div class="bignum">${sp.addressable_spend_usd!=null?money1(sp.addressable_spend_usd):'—'}</div>
         <div class="muted" style="font-size:11.5px;margin:2px 0 12px">${esc(sp.addressable_basis||'')}</div>
         ${levers.map(l=>`<div style="display:flex;align-items:baseline;gap:8px;margin:7px 0;font-size:12.5px"><span style="width:7px;height:7px;border-radius:50%;background:var(--brex);flex:none;align-self:center"></span><span style="flex:1"><b>${esc(l.lever)}</b><br><span class="muted" style="font-size:11px">${esc(l.note)}</span></span><span style="font-weight:700;color:var(--green);white-space:nowrap">${money1(l.savings_usd)}</span></div>`).join('')}
         <div style="margin-top:auto;padding-top:12px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:baseline"><span style="font-weight:600">Identified annual savings</span><span style="font-size:20px;font-weight:800;color:var(--green)">${sp.total_savings_usd!=null?money1(sp.total_savings_usd):'—'}</span></div>
         ${sp.savings_pct_of_revenue!=null?`<div class="muted" style="font-size:11.5px;text-align:right;margin-top:2px">${pct(sp.savings_pct_of_revenue)} of revenue</div>`:''}
       </div>
     </div>

     <h2>How Brex would improve this <span class="aipill"><span class="aidiamond">◆</span> AI</span> <span class="muted" style="text-transform:none;letter-spacing:0;font-weight:400">generated for ${esc(p.ticker)} on open</span></h2>
     <div id="resImprove"><div class="brief"><span class="spin" style="padding:2px">Claude is drafting the improvement plan…</span></div></div>
     <div class="aiask" style="margin-top:12px"><div class="aiask-h"><span class="aidiamond">◆</span> Ask Brex AI about ${esc(p.ticker)}</div><div class="aiask-sub">Ask me anything about this company's spend, filings or how we'd optimize it.</div><div class="askbar"><span class="aidiamond" style="font-size:16px">◆</span><input id="coAsk" placeholder="e.g. Where is the fastest 90-day saving?" onkeydown="if(event.key==='Enter')askData('For '+${q1(p.ticker)}+' ('+${q1(p.name)}+'): '+this.value)"><button class="ai sm" onclick="askData('For '+${q1(p.ticker)}+' ('+${q1(p.name)}+'): '+(el('coAsk').value||'What is the single highest-impact spend change and why?'))">Ask</button></div></div>

     <h2>Deploy agentic workflow <span class="aipill"><span class="aidiamond">◆</span> multi-step agent</span></h2>
     <div class="card">
       <div style="font-size:13px;margin-bottom:10px">Pick one spend issue and Claude will run an <b>autonomous tool-using workflow</b> — pulling the breakdown, consolidating SaaS, negotiating rates, drafting controls and sweeping idle cash — then report every action it took and the annual savings.</div>
       <div style="display:flex;gap:9px;flex-wrap:wrap;align-items:center">
         <select id="agentIssue" style="flex:1;min-width:240px" onchange="deployAgent(${q1(ticker)})">${(issues.length?issues:['reduce overall operating spend']).map(i=>`<option value="${esc(i)}">${esc(i)}</option>`).join('')}</select>
         <button class="ai" id="agentBtn" onclick="deployAgent(${q1(ticker)})"><span class="aidiamond" style="color:#fff">◆</span> Deploy agent</button>
       </div>
       <div class="muted" style="font-size:11.5px;margin-top:7px">Pick an issue above (or hit Deploy) and the agent runs immediately — ~15-30s on Opus, faster on Haiku (switch the model top-right).</div>
       <div id="agentOut" style="margin-top:12px"></div>
     </div>

     <h2>Accounting tie-outs <span class="aipill">recomputed from filing</span></h2><div class="card">${p.tieouts.map(t=>`<div class="tieoutrow"><span class="tk">${esc(t.check)}</span><span class="muted" style="font-size:12px">${money1(t.lhs_usd)} vs ${money1(t.rhs_usd)} · Δ ${money1(t.delta_usd)}</span>${t.passed?rb('low','✓ ties out'):rb('high','✗ mismatch')}</div>`).join('')||'<div class="muted">no comparable identities filed</div>'}</div>
     <div id="resAnalysis" style="margin-top:16px"></div>`;
  el('resAnalyze').onclick=()=>analyzeCompany(ticker);

async function improveCompany(ticker,g){
  try{const a=await jpost('/api/research/improve',{ticker,model:STATE.model});
    if(!fresh(g)||!el('resImprove'))return;
    if(a.detail){el('resImprove').innerHTML='<div class="card"><span class="muted">'+esc(a.detail)+' — set your key in <b>.env</b> and restart to auto-generate this plan.</span></div>';return;}
    const imp=a.improvements||[];
    el('resImprove').innerHTML=`<div class="brief"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span class="aipill"><span class="aidiamond">◆</span> Claude · ${esc(a.model||'')}</span><b style="font-size:13.5px">${esc(a.headline||'')}</b><span style="flex:1"></span><span class="pillbadge pill-healthy">${money1(a.total_savings_usd||0)}/yr</span></div>
      <div class="bt" style="margin-bottom:12px">${esc(a.summary||'')}</div>
      <div class="improvegrid">${imp.map(x=>`<div class="impcard"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><b style="font-size:13px">${esc(x.area)}</b><span class="pillbadge eff-${esc(x.effort)}">${esc(x.effort)}</span></div>
        <div class="muted" style="font-size:11.5px;margin:5px 0"><b>Problem:</b> ${esc(x.problem)}</div>
        <div style="font-size:12px;margin:5px 0"><b>Action:</b> ${esc(x.action)}</div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:8px;padding-top:8px;border-top:1px solid var(--line)"><span style="font-size:18px;font-weight:800;color:var(--green)">${money1(x.savings_usd)}</span><span class="muted" style="font-size:11px">${x.savings_pct!=null?pct(x.savings_pct)+' · ':''}${esc(x.timeline)}</span></div></div>`).join('')}</div></div>`;
  }catch(e){if(el('resImprove'))el('resImprove').innerHTML='<div class="card"><span class="red">'+esc(String(e))+'</span></div>';}
}
async function deployAgent(ticker){
  if(window._agentBusy)return; window._agentBusy=true;
  const issue=el('agentIssue')?el('agentIssue').value:'reduce overall operating spend';
  const done=()=>{window._agentBusy=false;if(el('agentBtn'))el('agentBtn').disabled=false;if(el('agentIssue'))el('agentIssue').disabled=false;};
  if(el('agentBtn'))el('agentBtn').disabled=true; if(el('agentIssue'))el('agentIssue').disabled=true;
  el('agentOut').innerHTML=`<div class="brief"><span class="spin" style="padding:2px">Agent is working on “${esc(issue)}” — calling tools (this runs several steps, ~15-30s)…</span></div>`;
  try{const r=await jpost('/api/research/agent',{ticker,issue,model:STATE.model});
    done();
    if(!el('agentOut'))return;
    if(r.detail){el('agentOut').innerHTML='<div class="card"><span class="muted">'+esc(r.detail)+' — set your key in <b>.env</b> and restart.</span></div>';return;}
    const steps=r.steps||[];
    el('agentOut').innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span class="aipill"><span class="aidiamond">◆</span> Agent · ${esc(r.model||'')}</span><span class="muted" style="font-size:12px">${steps.length} action${steps.length===1?'':'s'} taken · cost $${(r.cost_usd||0).toFixed(4)}</span></div>
      <div class="agentsteps">${steps.map((st,i)=>`<div class="astep"><div class="astep-h"><span class="astep-n">${i+1}</span><b>${esc(prettyTool(st.tool))}</b></div><div class="astep-b">${agentResult(st.output)}</div></div>`).join('')}</div>
      <div class="brief" style="margin-top:12px"><div class="aiask-h" style="margin-bottom:6px"><span class="aidiamond">◆</span> Workflow summary</div><div class="bt">${mdLite(r.final)}</div></div>`;
  }catch(e){done();if(el('agentOut'))el('agentOut').innerHTML='<div class="card"><span class="red">'+esc(String(e))+'</span></div>';}
}
function mdLite(t){return esc(t||'').replace(/^\s*---+\s*$/gm,'<hr style="border:none;border-top:1px solid var(--line);margin:8px 0">').replace(/^#{1,4}\s*(.+)$/gm,'<b>$1</b>').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\n{2,}/g,'<br><br>').replace(/\n/g,'<br>');}
function prettyTool(t){return ({pull_spend_breakdown:'Pulled spend breakdown',find_duplicate_saas:'Consolidated duplicate SaaS',benchmark_vendor_rates:'Benchmarked vendor rates & rebates',draft_policy_controls:'Drafted real-time spend controls',deploy_treasury_sweep:'Deployed idle-cash treasury sweep',project_total_savings:'Projected total annual savings'})[t]||t;}

function agentResult(o){
  if(o==null)return '';
  const money=k=>/(usd|savings|yield|cash|spend)/i.test(k);
  const rows=[];
  for(const k in o){const v=o[k];
    if(Array.isArray(v)){rows.push(`<div class="muted" style="font-size:11.5px;margin-top:4px">${esc(k.replace(/_/g,' '))}:</div>`+v.map(it=>typeof it==='object'?`<div style="font-size:11.5px;margin-left:8px">• ${Object.entries(it).map(([kk,vv])=>esc(kk.replace(/_/g,' '))+' '+(money(kk)&&typeof vv==='number'?money1(vv):esc(String(vv)))).join(' · ')}</div>`:`<div style="font-size:11.5px;margin-left:8px">• ${esc(String(it))}</div>`).join(''));}
    else if(typeof v==='object'){/*skip nested*/}
    else rows.push(`<div style="font-size:12px;display:flex;justify-content:space-between;gap:10px"><span class="muted">${esc(k.replace(/_/g,' '))}</span><span style="font-weight:600">${money(k)&&typeof v==='number'?money1(v):(typeof v==='number'&&v<1&&v>0?pct(v):esc(String(v)))}</span></div>`);}
  return rows.join('');
}

function openAI(tab){ STATE.aiTab=tab; el('aiCtx').textContent='· '+(PAGES[STATE.page]?.title||''); el('ai').classList.add('open');
  el('aiBody').innerHTML=`<div class="starter"><textarea id="aiq" placeholder="ask the ${tab.replace(/_/g,' ')} agent…"></textarea><button class="ai" id="aigo">Run</button></div><div id="aiconv"></div>`;
  el('aigo').onclick=aiStart; el('aiq').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();aiStart();}}); el('aiq').focus(); }
function closeAI(){ el('ai').classList.remove('open'); }
function aiAdd(h){ el('aiconv').insertAdjacentHTML('beforeend',h); el('aiBody').scrollTop=el('aiBody').scrollHeight; }
function aiSpin(on){ if(on)aiAdd('<div class="spin" id="aispin">agent is thinking…</div>'); else el('aispin')?.remove(); }
async function aiStart(){
  const q=el('aiq').value.trim(); el('aigo').disabled=true; el('aiq').disabled=true; aiSpin(true);
  const res=await jpost('/api/session/start',{persona:STATE.role,tab:STATE.aiTab,query:q||null,employee_id:STATE.role==='employee'?STATE.employee:null,model:STATE.model});
  aiSpin(false); aiHandle(res);
}
function aiHandle(res){
  if(res.cost_usd!=null){STATE.cost=res.cost_usd; el('cost').textContent='$'+res.cost_usd.toFixed(4);}
  STATE.sessionId=res.session_id||STATE.sessionId;
  if(res.status==='error'){aiAdd(`<div class="answer notver">${esc(res.message)}</div>`);return;}
  if(res.status==='need_selection'){aiAsk(res);return;}
  if(res.status==='complete'){aiAnswer(res);}
}
function aiAsk(res){
  STATE.multi=[]; const id='ask'+Math.floor(performance.now());
  aiAdd(`<div class="ask" id="${id}"><div class="q">${esc(res.prompt)}</div><div class="opts">${res.options.map((o,i)=>`<div class="opt" data-i="${i}">${esc(o)}</div>`).join('')}</div>${res.allow_multiple?'<button class="ai sm" style="margin-top:9px" id="cont">Continue →</button>':''}</div>`);
  const box=el(id);
  box.querySelectorAll('.opt').forEach(o=>o.onclick=()=>{const v=res.options[o.dataset.i];
    if(res.allow_multiple){o.classList.toggle('sel');const k=STATE.multi.indexOf(v);k>=0?STATE.multi.splice(k,1):STATE.multi.push(v);}
    else{box.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));o.classList.add('sel');aiSend([v],box);}});
  if(res.allow_multiple)el('cont').onclick=()=>aiSend(STATE.multi.length?STATE.multi:[res.options[0]],box);
}
async function aiSend(sel,box){
  box.querySelectorAll('.opt,button').forEach(x=>x.style.pointerEvents='none');
  aiAdd(`<div class="picked">chose: <b>${sel.join(', ')}</b></div>`); aiSpin(true);
  const res=await jpost('/api/session/step',{session_id:STATE.sessionId,selection:sel.length===1?sel[0]:sel});
  aiSpin(false); aiHandle(res);
}
function aiAnswer(res){
  const work=(res.trace||[]).filter(s=>s.tool!=='request_user_selection');
  const findings=work.map(s=>{const f=FIND[s.tool];const b=f?f(s.output||{}):'';return b?`<div class="fcard"><div class="ft"><span class="aidiamond">◆</span> ${s.tool.replace(/_/g,' ')}</div>${b}</div>`:'';}).join('');
  const steps=work.map(s=>`<div class="step"><b>${s.tool}</b></div>`).join('')||'<div class="step">no tools</div>';
  aiAdd(`<div class="answer">${findings}<div class="narr">${md(res.answer||'')}</div><div class="trace"><div class="hh" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">▸ ${work.length} tool calls · $${(res.cost_usd||0).toFixed(4)}</div><div style="display:none">${steps}</div></div></div>`);
}
function md(t){const lines=String(t).split('\n');let out='',i=0;const inl=s=>esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/`(.+?)`/g,'<code>$1</code>');
  while(i<lines.length){let l=lines[i];
    if(/^\s*\|.*\|/.test(l)){const rows=[];while(i<lines.length&&/^\s*\|.*\|/.test(lines[i])){rows.push(lines[i]);i++;}
      const cells=r=>r.trim().replace(/^\||\|$/g,'').split('|').map(c=>c.trim());let body='';
      rows.forEach((r,ri)=>{if(/^[\s|:-]+$/.test(r))return;const tag=ri===0?'th':'td';body+='<tr>'+cells(r).map(c=>`<${tag}>${inl(c)}</${tag}>`).join('')+'</tr>';});
      out+=`<table class="ftable">${body}</table>`;continue;}
    if(/^###?\s/.test(l))out+='<h3>'+inl(l.replace(/^#+\s/,''))+'</h3>';
    else if(/^#\s/.test(l))out+='<h2>'+inl(l.replace(/^#\s/,''))+'</h2>';
    else if(/^\s*[-*]\s/.test(l))out+='<div>• '+inl(l.replace(/^\s*[-*]\s/,''))+'</div>';
    else if(l.trim()==='')out+='<div style="height:5px"></div>';else out+='<div>'+inl(l)+'</div>';i++;}
  return out;
}
// ---------- modal ----------
function showModal(html){ el('modalHost').innerHTML=`<div class="modal" onclick="if(event.target===this)closeModal()"><div class="box">${html}</div></div>`; }
function closeModal(){ el('modalHost').innerHTML=''; }
boot();
</script>
